<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f8f7f4;color:#1a1a1a;}
.header{background:#1D9E75;color:#fff;padding:18px 20px;}
.header h1{font-size:19px;font-weight:700;margin-bottom:3px;}
.header p{font-size:12px;opacity:.85;}
.back-btn{display:inline-block;margin-top:8px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;font-size:12px;text-decoration:none;border:1px solid rgba(255,255,255,.4);}
.container{max-width:740px;margin:0 auto;padding:18px 16px;}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.grade-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.gtab{padding:8px 20px;border-radius:20px;border:1.5px solid #ddd;background:#f8f7f4;font-size:13px;cursor:pointer;color:#666;font-weight:500;transition:all .12s;}
.gtab.on{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.grade-section{display:none;}
.grade-section.on{display:block;}
.unit-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:4px;}
.unit-btn{border:1.5px solid #e8e6e0;border-radius:8px;padding:10px 12px;cursor:pointer;background:#f8f7f4;font-size:13px;text-align:left;transition:all .12s;line-height:1.4;color:#1a1a1a;}
.unit-btn:hover{background:#E1F5EE;border-color:#1D9E75;}
.unit-btn.on{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
.learn-area{display:none;}
.learn-area.on{display:block;}
.learn-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ltab{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#f8f7f4;font-size:13px;cursor:pointer;color:#666;transition:all .12s;}
.ltab.on{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.learn-step{display:none;}
.learn-step.on{display:block;}
.yt-card{border:1.5px solid #e8e6e0;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;background:#f8f7f4;}
.yt-thumb{width:44px;height:44px;border-radius:6px;background:#FF0000;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;}
.yt-info{flex:1;}
.yt-ch{font-size:11px;color:#666;margin-bottom:2px;}
.yt-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.yt-desc{font-size:12px;color:#888;}
.yt-btn{display:inline-block;margin-top:6px;padding:5px 12px;border-radius:6px;background:#FF0000;color:#fff;font-size:11px;font-weight:600;text-decoration:none;}
.q-box{background:#f8f7f4;border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.q-en{font-size:12px;color:#085041;font-weight:600;margin-bottom:3px;line-height:1.5;}
.q-ja{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:10px;line-height:1.5;}
.opts{display:grid;gap:6px;}
.opt-btn{padding:9px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:13px;cursor:pointer;text-align:left;transition:all .12s;}
.opt-btn:hover:not(:disabled){border-color:#1D9E75;background:#E1F5EE;}
.opt-btn.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:600;}
.opt-btn.wrong{background:#FAECE7;border-color:#E05A3A;color:#712B13;}
.opt-btn:disabled{cursor:default;}
.exp-box{background:#EEEDFE;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;color:#3C3489;line-height:1.7;display:none;}
.exp-en{font-size:12px;color:#534AB7;margin-top:5px;font-style:italic;}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.score-n{font-size:20px;font-weight:700;color:#1D9E75;}
.prog-bar{flex:1;height:6px;background:#e8e6e0;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .4s;}
.next-btn{padding:8px 18px;border-radius:8px;background:#1D9E75;color:#fff;font-size:13px;border:none;cursor:pointer;margin-top:10px;}
.think-q{background:#FEF6E8;border-left:3px solid #C8830A;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:10px;font-size:14px;line-height:1.65;}
.think-en{font-size:12px;color:#BA7517;margin-top:4px;font-style:italic;}
textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #ddd;background:#f8f7f4;font-size:13px;resize:vertical;min-height:60px;font-family:inherit;margin-top:6px;}
.world-box{background:#E1F5EE;border-radius:10px;padding:12px 16px;font-size:13px;color:#085041;line-height:1.75;margin-top:10px;}
.unit-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.unit-title{font-size:15px;font-weight:700;flex:1;color:#085041;}
.close-unit{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid #ddd;background:#f8f7f4;color:#666;cursor:pointer;}
</style>
</head>

    {name:"光と音",

    {name:"大地の変化",

       {q:"食物連鎖で一次消費者が食べるのは？",qe:"What does a primary consumer eat in a food chain?",opts:["他の動物","植物（生産者）","分解者","腐った有機物"],ans:1,exp:"一次消費者は植物（生産者）を食べる草食動物。生産者→一次消費者→二次消費者→分解者。",expe:"Primary consumers are herbivores that eat plants (producers). Producers→1st→2nd consumers→decomposers."},

var curUnit = null;
var quizIdx = 0, quizScore = 0, quizAnswered = false;

// Build unit buttons
function buildUnits(grade) {
  var gradeUnits = units[grade];
  var gradeKey = grade === "中1" ? "g1" : grade === "中2" ? "g2" : "g3";
  var ulId = grade === "中1" ? "ul1" : grade === "中2" ? "ul2" : "ul3";
  var ul = document.getElementById(ulId);
  if (ul.children.length > 0) return;
  gradeUnits.forEach(function(u) {
    var btn = document.createElement("button");
    btn.className = "unit-btn";
    btn.textContent = u.name;
    btn.onclick = function() {
      document.querySelectorAll(".unit-btn").forEach(function(b) { b.classList.remove("on"); b.style.background=""; b.style.color=""; });
      btn.classList.add("on");
      openUnit(u);
    };
    ul.appendChild(btn);
  });
}

function switchGrade(id, btn) {
  document.querySelectorAll(".grade-section").forEach(function(s) { s.classList.remove("on"); });
  document.querySelectorAll(".gtab").forEach(function(t) { t.classList.remove("on"); });
  document.getElementById(id).classList.add("on");
  btn.classList.add("on");
  var grade = id === "g1" ? "中1" : id === "g2" ? "中2" : "中3";
  buildUnits(grade);
  closeUnit();
}

function openUnit(u) {
  curUnit = u;
  document.getElementById("unit-title").textContent = u.name;
  document.getElementById("learn-area").classList.add("on");
  switchLearn("video", document.querySelectorAll(".ltab")[0]);
  document.getElementById("learn-area").scrollIntoView({behavior:"smooth"});
}

function closeUnit() {
  document.getElementById("learn-area").classList.remove("on");
  document.querySelectorAll(".unit-btn").forEach(function(b) { b.classList.remove("on"); });
  curUnit = null;
}

function switchLearn(step, btn) {
  document.querySelectorAll(".learn-step").forEach(function(s) { s.classList.remove("on"); });
  document.querySelectorAll(".ltab").forEach(function(t) { t.classList.remove("on"); });
  document.getElementById("ls-" + step).classList.add("on");
  if (btn) btn.classList.add("on");
  if (step === "video") renderVideos();
  if (step === "quiz") { quizIdx = 0; quizScore = 0; renderQuiz(); }
  if (step === "deep") renderDeep();
}

function renderVideos() {
  if (!curUnit) return;
  var vl = document.getElementById("video-list");
  vl.innerHTML = "";
  curUnit.yt.forEach(function(v) {
    var d = document.createElement("div");
    d.className = "yt-card";
    d.innerHTML = "<div class=\"yt-thumb\">&#9654;</div><div class=\"yt-info\"><div class=\"yt-ch\">" + v.ch + "</div><div class=\"yt-title\">" + v.title + "</div><div class=\"yt-desc\">" + v.desc + "</div><a href=\"" + v.url + "\" target=\"_blank\" class=\"yt-btn\">&#9654; YouTubeで見る</a></div>";
    vl.appendChild(d);
  });
}

function renderQuiz() {
  if (!curUnit) return;
  var qs = curUnit.quiz;
  var qa = document.getElementById("quiz-area");
  if (quizIdx >= qs.length) {
    var pct = Math.round(quizScore / qs.length * 100);
    qa.innerHTML = "<div style=\"text-align:center;padding:16px 0;\"><div style=\"font-size:32px;margin-bottom:8px;\">" + (pct>=80?"&#127881;":pct>=60?"&#128077;":"&#128170;") + "</div><div style=\"font-size:20px;font-weight:700;color:#1D9E75;margin-bottom:6px;\">" + quizScore + " / " + qs.length + " 正解</div><div style=\"font-size:13px;color:#666;margin-bottom:14px;\">" + pct + "% — " + (pct>=80?"Great!":pct>=60?"Good! もう一度動画を見よう":"動画を見直してチャレンジ！") + "</div><button onclick=\"quizIdx=0;quizScore=0;renderQuiz()\" style=\"padding:8px 18px;border-radius:8px;background:#1D9E75;color:#fff;font-size:13px;border:none;cursor:pointer;\">もう一度</button></div>";
    return;
  }
  updateScoreBar(qs.length);
  var q = qs[quizIdx];
  var optsHTML = q.opts.map(function(o, i) { return "<button class=\"opt-btn\" onclick=\"answerQ(" + i + ")\">" + o + "</button>"; }).join("");
  qa.innerHTML = "<div class=\"q-box\"><div class=\"q-en\">&#127468;&#127463; " + q.qe + "</div><div class=\"q-ja\">&#127471;&#127477; " + q.q + "</div><div class=\"opts\">" + optsHTML + "</div><div class=\"exp-box\" id=\"exp-box\"><strong>&#128218; 解説</strong><br>" + q.exp + "<div class=\"exp-en\">&#127468;&#127463; " + q.expe + "</div></div></div><button class=\"next-btn\" id=\"nxt-btn\" style=\"display:none;\" onclick=\"nextQ()\">" + (quizIdx < qs.length-1 ? "次の問題 &#8594;" : "結果を見る &#127881;") + "</button>";
  quizAnswered = false;
}

function answerQ(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  var q = curUnit.quiz[quizIdx];
  document.querySelectorAll(".opt-btn").forEach(function(b, idx) {
    b.disabled = true;
    if (idx === q.ans) b.classList.add("correct");
    else if (idx === i && i !== q.ans) b.classList.add("wrong");
  });
  if (i === q.ans) quizScore++;
  document.getElementById("exp-box").style.display = "block";
  document.getElementById("nxt-btn").style.display = "inline-block";
  updateScoreBar(curUnit.quiz.length);
}

function nextQ() { quizIdx++; renderQuiz(); }

function updateScoreBar(total) {
  document.getElementById("score-disp").textContent = quizScore + "/" + total;
  document.getElementById("prog-fill").style.width = Math.round(quizScore/total*100) + "%";
}

function renderDeep() {
  if (!curUnit) return;
  var d = curUnit.deep;
  var da = document.getElementById("deep-area");
  var html = "";
  d.thinks.forEach(function(t) {
    html += "<div class=\"think-q\">&#129504; " + t.q + "<div class=\"think-en\">&#127468;&#127463; " + t.qe + "</div></div>";
  });
  html += "<textarea placeholder=\"考えたことを書こう / Write your thoughts (English or Japanese OK)...\"></textarea>";
  html += "<div class=\"world-box\"><strong>&#127758; 世界・熊本とのつながり</strong><br>" + d.world + "</div>";
  html += "<div style=\"margin-top:12px;\"><a href=\"tool6_study.html\" style=\"display:inline-block;padding:8px 14px;border-radius:8px;background:#1D9E75;color:#fff;font-size:13px;font-weight:600;text-decoration:none;\">&#127891; 他の教科も学ぼう</a></div>";
  da.innerHTML = html;
}

// Initialize
buildUnits("中1");
</script>
