    {name:"世界の国々・文化",yt:[{ch:"とある男が授業をしてみた",title:"世界の六大州・主要国",url:"https://www.youtube.com/results?search_query=葉一+世界+六大州+主要国+中学社会",desc:"各州の特色と代表的な国"},{ch:"Try IT 中学社会",title:"世界の宗教・文化",url:"https://www.youtube.com/results?search_query=TryIT+世界+宗教+文化+中学社会",desc:"三大宗教と地域文化を解説"}],

     quiz:[{q:"日本の食料自給率（カロリーベース）は約何%？",qe:"What is Japan's food self-sufficiency rate (calorie basis)?",opts:["約30%","約38%","約60%","約75%"],ans:1,exp:"日本の食料自給率は約38%（2022年）。先進国の中で最低水準。",expe:"Japan's food self-sufficiency rate is about 38% (2022) — the lowest among developed nations."},{q:"日本の主要な輸出品は？",qe:"What are Japan's main exports?",opts:["石油・天然ガス","自動車・機械・半導体","農産物・水産物","衣類・繊維"],ans:1,exp:"自動車・機械・半導体・電子部品が主要輸出品。熊本のTSMCも半導体輸出に貢献。",expe:"Cars, machinery, and semiconductors are Japan's main exports. Kumamoto's TSMC contributes to semiconductor exports."},{q:"日本が最も多く輸入しているものは？",qe:"What does Japan import most?",opts:["食料","石油・エネルギー","機械","衣類"],ans:1,exp:"石油・LNGなどエネルギー資源が最大の輸入品。エネルギー自給率は約13%。",expe:"Oil and LNG are Japan's largest imports. Energy self-sufficiency is only about 13%."}],

var curUnit = null;
var quizIdx = 0, quizScore = 0, quizAnswered = false;

function buildUnits(grade) {
  var g = grade==="中1"?"g1":grade==="中2"?"g2":"g3";
  var ul = document.getElementById("ul"+(g==="g1"?"1":g==="g2"?"2":"3"));
  if (ul.children.length > 0) return;
  units[grade].forEach(function(u) {
    var btn = document.createElement("button");
    btn.className = "unit-btn";
    btn.textContent = u.name;
    btn.onclick = function() {
      document.querySelectorAll(".unit-btn").forEach(function(b){b.classList.remove("on");});
      btn.classList.add("on");
      openUnit(u);
    };
    ul.appendChild(btn);
  });
}

function switchGrade(id, btn) {
  document.querySelectorAll(".grade-section").forEach(function(s){s.classList.remove("on");});
  document.querySelectorAll(".gtab").forEach(function(t){t.classList.remove("on");});
  document.getElementById(id).classList.add("on");
  btn.classList.add("on");
  var g = id==="g1"?"中1":id==="g2"?"中2":"中3";
  buildUnits(g);
  closeUnit();
}

function openUnit(u) {
  curUnit = u;
  document.getElementById("unit-title").textContent = u.name;
  document.getElementById("learn-area").classList.add("on");
  switchLearn("video", document.querySelectorAll(".ltab")[0]);
  document.getElementById("learn-area").scrollIntoView({behavior:"smooth"});
}

function closeUnit() {
  document.getElementById("learn-area").classList.remove("on");
  document.querySelectorAll(".unit-btn").forEach(function(b){b.classList.remove("on");});
  curUnit = null;
}

function switchLearn(step, btn) {
  document.querySelectorAll(".learn-step").forEach(function(s){s.classList.remove("on");});
  document.querySelectorAll(".ltab").forEach(function(t){t.classList.remove("on");});
  document.getElementById("ls-"+step).classList.add("on");
  if(btn) btn.classList.add("on");
  if(step==="video") renderVideos();
  if(step==="quiz"){quizIdx=0;quizScore=0;renderQuiz();}
  if(step==="deep") renderDeep();
}

function renderVideos() {
  if(!curUnit) return;
  var vl = document.getElementById("video-list");
  vl.innerHTML = "";
  curUnit.yt.forEach(function(v){
    var d = document.createElement("div");
    d.className = "yt-card";
    d.innerHTML = "<div class=\"yt-thumb\">&#9654;</div><div class=\"yt-info\"><div class=\"yt-ch\">"+v.ch+"</div><div class=\"yt-title\">"+v.title+"</div><div class=\"yt-desc\">"+v.desc+"</div><a href=\""+v.url+"\" target=\"_blank\" class=\"yt-btn\">&#9654; YouTubeで見る</a></div>";
    vl.appendChild(d);
  });
}

function renderQuiz() {
  if(!curUnit) return;
  var qs = curUnit.quiz;
  var qa = document.getElementById("quiz-area");
  if(quizIdx >= qs.length){
    var pct = Math.round(quizScore/qs.length*100);
    qa.innerHTML = "<div style=\"text-align:center;padding:16px 0;\"><div style=\"font-size:32px;margin-bottom:8px;\">"+(pct>=80?"&#127881;":pct>=60?"&#128077;":"&#128170;")+"</div><div style=\"font-size:20px;font-weight:700;color:#C8830A;margin-bottom:6px;\">"+quizScore+" / "+qs.length+" 正解</div><button onclick=\"quizIdx=0;quizScore=0;renderQuiz()\" style=\"padding:8px 18px;border-radius:8px;background:#C8830A;color:#fff;font-size:13px;border:none;cursor:pointer;\">もう一度</button></div>";
    return;
  }
  document.getElementById("score-disp").textContent = quizScore+"/"+qs.length;
  document.getElementById("prog-fill").style.width = Math.round(quizScore/qs.length*100)+"%";
  var q = qs[quizIdx];
  var optsHTML = q.opts.map(function(o,i){"return <button class=\"opt-btn\" onclick=\"answerQ("+i+")\">"+o+"</button>";}).join("");
  qa.innerHTML = "<div class=\"q-box\"><div class=\"q-en\">&#127468;&#127463; "+q.qe+"</div><div class=\"q-ja\">&#127471;&#127477; "+q.q+"</div><div class=\"opts\">"+q.opts.map(function(o,i){return "<button class=\"opt-btn\" onclick=\"answerQ("+i+")\">"+o+"</button>";}).join("")+"</div><div class=\"exp-box\" id=\"exp-box\"><strong>&#128218; 解説</strong><br>"+q.exp+"<div class=\"exp-en\">&#127468;&#127463; "+q.expe+"</div></div></div><button class=\"next-btn\" id=\"nxt-btn\" style=\"display:none;\" onclick=\"nextQ()\">"+(quizIdx<qs.length-1?"次の問題 &#8594;":"結果を見る &#127881;")+"</button>";
  quizAnswered = false;
}

function answerQ(i) {
  if(quizAnswered) return;
  quizAnswered = true;
  var q = curUnit.quiz[quizIdx];
  document.querySelectorAll(".opt-btn").forEach(function(b,idx){
    b.disabled = true;
    if(idx===q.ans) b.classList.add("correct");
    else if(idx===i&&i!==q.ans) b.classList.add("wrong");
  });
  if(i===q.ans) quizScore++;
  document.getElementById("exp-box").style.display = "block";
  document.getElementById("nxt-btn").style.display = "inline-block";
  document.getElementById("score-disp").textContent = quizScore+"/"+curUnit.quiz.length;
  document.getElementById("prog-fill").style.width = Math.round(quizScore/curUnit.quiz.length*100)+"%";
}

function nextQ(){quizIdx++;renderQuiz();}

function renderDeep() {
  if(!curUnit) return;
  var d = curUnit.deep;
  var da = document.getElementById("deep-area");
  var html = "";
  d.thinks.forEach(function(t){html+="<div class=\"think-q\">&#129504; "+t.q+"<div class=\"think-en\">&#127468;&#127463; "+t.qe+"</div></div>";});
  html += "<textarea placeholder=\"考えたことを書こう / Write your thoughts...\"></textarea>";
  html += "<div class=\"world-box\"><strong>&#127758; 世界・熊本とのつながり</strong><br>"+d.world+"</div>";
  html += "<div style=\"margin-top:12px;\"><a href=\"tool6_study.html\" style=\"display:inline-block;padding:8px 14px;border-radius:8px;background:#C8830A;color:#fff;font-size:13px;font-weight:600;text-decoration:none;\">&#127891; 他の教科も学ぼう</a></div>";
  da.innerHTML = html;
}

buildUnits("中1");
</script>
