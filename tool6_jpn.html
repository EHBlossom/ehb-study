<script>
var units = {
  "中1": [
    {name:"文法：品詞の種類",yt:[{ch:"とある男が授業をしてみた",title:"品詞の種類と見分け方",url:"https://www.youtube.com/results?search_query=葉一+品詞+国語+中学",desc:"10品詞の特徴と見分け方"},{ch:"Try IT 中学国語",title:"文節・単語の区切り方",url:"https://www.youtube.com/results?search_query=TryIT+品詞+文節+国語+中学",desc:"文節と単語を正確に区切る"}],
     quiz:[{q:"「美しい花が咲いた」の「美しい」は何品詞か？",qe:"What part of speech is 'utsukushii' (beautiful) in this sentence?",opts:["名詞","形容詞","副詞","動詞"],ans:1,exp:"形容詞は物事の性質・状態を表す語。「〜い」で終わることが多い（美しい・大きい・楽しい）。",expe:"Adjectives (keiyoshi) describe the nature or state of things. Many end in 'i' in Japanese."},{q:"「ゆっくり歩く」の「ゆっくり」は何品詞か？",qe:"What part of speech is 'yukkuri' (slowly) in this phrase?",opts:["形容詞","動詞","副詞","接続詞"],ans:2,exp:"副詞は動詞・形容詞・形容動詞を修飾する語。「どのように」「どのくらい」を表す。",expe:"Adverbs (fukushi) modify verbs and adjectives. They express 'how' or 'to what extent'."},{q:"「しかし」「そして」「だから」は何品詞か？",qe:"What part of speech are 'shikashi' (however), 'soshite' (and), 'dakara' (therefore)?",opts:["動詞","副詞","接続詞","感動詞"],ans:2,exp:"接続詞は文と文・節と節をつなぐ語。しかし（逆接）・そして（順接）・だから（因果）。",expe:"Conjunctions (setsuzokushi) connect sentences or clauses. Similar to however/and/therefore in English."}],
     deep:{thinks:[{q:"品詞の分類は言語によって異なる。英語と日本語の品詞の違いを比べてみよう。",qe:"Parts of speech differ between languages. Compare Japanese and English grammatical categories."},{q:"接続詞（だから・しかし・なぜなら）を使いこなすと文章がなぜ上手くなるのか？",qe:"Why does using conjunctions (therefore, however, because) make writing better?"}],world:"言語の文法構造は文化的思考パターンを反映する。英語（SVO）と日本語（SOV）の語順の違いは情報の提示順序とも関係する。グローバルな発信力には両方の文法の理解が必要。"}},

    {name:"文法：活用・文の成分",yt:[{ch:"とある男が授業をしてみた",title:"動詞の活用形（未然・連用・終止...）",url:"https://www.youtube.com/results?search_query=葉一+動詞+活用形+国語+中学",desc:"6つの活用形を整理"},{ch:"Try IT 中学国語",title:"文の成分（主語・述語・修飾語）",url:"https://www.youtube.com/results?search_query=TryIT+文の成分+主語+述語+中学国語",desc:"文節の関係を正確に分析"}],
     quiz:[{q:"「書く」の連用形は？",qe:"What is the 'renyokei' (continuative form) of 'kaku' (to write)?",opts:["書か","書き","書く","書け"],ans:1,exp:"連用形は「書き」。「書きます」「書いて」などの前に来る形。動詞の活用は暗記が重要。",expe:"The continuative form is 'kaki'. Used before 'masu' and 'te' forms. Verb conjugation requires memorization."},{q:"「走る選手が速い」の主語はどれか？",qe:"What is the subject of the sentence 'The athlete who runs is fast'?",opts:["走る","選手が","速い","走る選手が"],ans:3,exp:"主語は文全体の主となる語句。「走る選手が」が「速い」の主語。「が」でわかる。",expe:"The subject is the main topic of the sentence. 'Hashiru senshu ga' is marked by the subject marker 'ga'."},{q:"「彼は丁寧に問題を解いた」の「丁寧に」は？",qe:"What is the function of 'teinei ni' (carefully) in this sentence?",opts:["主語","述語","連体修飾語","連用修飾語"],ans:3,exp:"連用修飾語は述語（動詞）を修飾する語。「丁寧に解いた」→「丁寧に」が「解いた」を修飾。",expe:"An adverbial modifier modifies the predicate (verb). 'Teinei ni' modifies 'toita' (solved)."}],
     deep:{thinks:[{q:"日本語には主語がなくても成り立つ文がある。英語と比較してなぜ違いが生まれたのか？",qe:"Japanese sentences can function without a subject. Why does this difference from English exist?"},{q:"動詞の活用形をすべて覚えることは必要か？それとも理解する方が重要か？",qe:"Is it necessary to memorize all verb conjugation forms, or is understanding the pattern more important?"}],world:"日本語の文法は世界の言語の中で独特の構造を持つ。SOV語順・敬語システム・省略の多さなど。言語の多様性はSDG4（質の高い教育）と文化遺産の保護（SDG11）に関わる。"}},

    {name:"古典入門：竹取物語・枕草子",yt:[{ch:"とある男が授業をしてみた",title:"竹取物語の読み方・現代語訳",url:"https://www.youtube.com/results?search_query=葉一+竹取物語+古典+中学国語",desc:"日本最古の物語を読もう"},{ch:"Try IT 中学国語",title:"枕草子・徒然草の基礎",url:"https://www.youtube.com/results?search_query=TryIT+枕草子+徒然草+古典+中学国語",desc:"随筆文学の特徴と読み方"}],
     quiz:[{q:"竹取物語は何時代に書かれたか？",qe:"In which period was The Tale of the Bamboo Cutter written?",opts:["奈良時代","平安時代","江戸時代","鎌倉時代"],ans:1,exp:"竹取物語は平安時代（9〜10世紀）。日本最古の物語文学で作者不詳。「かぐや姫」の物語。",expe:"Written in the Heian period (9th-10th century). Japan's oldest narrative literature, author unknown."},{q:"「今は昔」という書き出しは何を意味するか？",qe:"What does 'ima wa mukashi' (literally 'now is the past') mean?",opts:["現代の話","昔話の始まりの定型句","将来の話","外国の話"],ans:1,exp:"「今は昔」は「昔々のことですが」という意味の古文定型句。英語の「Once upon a time」に相当。",expe:"'Ima wa mukashi' is a conventional opener meaning 'Long ago' — the Japanese 'Once upon a time'."},{q:"枕草子を書いたのは誰か？",qe:"Who wrote the Pillow Book (Makura no Soshi)?",opts:["紫式部","清少納言","小野小町","与謝野晶子"],ans:1,exp:"清少納言（せいしょうなごん）が平安時代中期に書いた随筆。「春はあけぼの」で始まる。",expe:"Sei Shonagon wrote this essay collection in the mid-Heian period. Famous opening: 'In spring, the dawn...'"}],
     deep:{thinks:[{q:"竹取物語は現代のSF・ファンタジーの原型。月から来た存在・不老不死の薬——現代的テーマがある。",qe:"The Bamboo Cutter is a prototype of sci-fi and fantasy. What modern themes does it contain?"},{q:"枕草子「春はあけぼの」と現代のSNS投稿を比べると、人間の感性はどう変わった？変わらない？",qe:"Compare Sei Shonagon's 'In spring, the dawn' with modern social media posts. How has human sensibility changed?"}],world:"竹取物語は英語に翻訳され世界中で読まれている。「かぐや姫」はジブリ映画にもなった。日本文学は世界のポップカルチャーに影響を与えるソフトパワー（SDG17：パートナーシップ）。"}},

    {name:"読解：説明文・物語文",yt:[{ch:"とある男が授業をしてみた",title:"説明文の読み方（段落・要旨）",url:"https://www.youtube.com/results?search_query=葉一+説明文+読解+中学国語",desc:"段落の役割と要旨のつかみ方"},{ch:"Try IT 中学国語",title:"物語文・詩の読み方",url:"https://www.youtube.com/results?search_query=TryIT+物語文+詩+読解+中学国語",desc:"登場人物の心情・情景描写の読み方"}],
     quiz:[{q:"説明文で筆者の主張を見つけるには？",qe:"How do you find the author's main argument in an expository text?",opts:["最初の段落だけ読む","接続詞・まとめの言葉に注目する","難しい言葉を調べる","段落数を数える"],ans:1,exp:"「つまり」「要するに」「このように」「したがって」などまとめの接続詞の後に主張が多い。",expe:"Summary words like 'in conclusion,' 'therefore,' 'in other words' often signal the main argument."},{q:"物語文で登場人物の心情を読み取る手がかりは？",qe:"What clues help understand a character's feelings in a story?",opts:["文字数を数える","言動・表情・情景描写","段落の数","漢字の読み方"],ans:1,exp:"登場人物の言葉・行動・表情・情景描写（その時の天気や環境）が心情を表す。",expe:"A character's words, actions, expressions, and the surrounding scenery reveal their inner feelings."},{q:"詩の「擬人法」とは？",qe:"What is 'personification' in poetry?",opts:["人が動物になる表現","人以外のものを人のように表現する技法","比喩で人を動物に例える","繰り返しの表現技法"],ans:1,exp:"擬人法：動物・植物・自然現象などを人間のように表現する修辞技法。",expe:"Personification: describing non-human things (animals, plants, nature) as if they were human."}],
     deep:{thinks:[{q:"説明文の「筆者の主張→根拠→具体例」の構造は英語のエッセイ（PREP法）と同じ。日英の違いを比べよう。",qe:"The 'claim→evidence→example' structure in Japanese expository writing is similar to English essays. Compare the two."},{q:"物語を読むと共感力（エンパシー）が育つと言われている。なぜ読書は人を成長させるのか？",qe:"Reading stories is said to develop empathy. Why does reading help people grow?"}],world:"読解力はすべての学習の基盤。英語の読解力と日本語の読解力は相互に強化し合う（SDG4）。NatGeoやBBCを英語で読む力は、国語の読解力の応用でもある。"}}
  ],

  "中2": [
    {name:"文法：用言（動詞・形容詞・形容動詞）",yt:[{ch:"とある男が授業をしてみた",title:"動詞の種類・形容詞と形容動詞",url:"https://www.youtube.com/results?search_query=葉一+動詞+形容詞+形容動詞+国語+中学",desc:"用言の3種類と活用の違い"},{ch:"Try IT 中学国語",title:"助詞・助動詞の種類",url:"https://www.youtube.com/results?search_query=TryIT+助詞+助動詞+国語+中学",desc:"付属語の役割と種類を整理"}],
     quiz:[{q:"「静かだ」は何用言か？",qe:"What type of predicate word (yogen) is 'shizukada' (is quiet)?",opts:["動詞","形容詞","形容動詞","助動詞"],ans:2,exp:"形容動詞は「〜だ」「〜な」で活用する用言。静かだ・親切だ・簡単だなど。",expe:"Keiyodoshi (adjectival nouns) conjugate with 'da/na'. Examples: shizukada, shinsetsuda, kantanda."},{q:"「〜ない」がつく動詞の活用形は？",qe:"Which conjugation form of a verb is used before 'nai' (not)?",opts:["連用形","終止形","未然形","仮定形"],ans:2,exp:"未然形（みぜんけい）は「〜ない」「〜う/よう」などが続く形。「書かない」→「書か」が未然形。",expe:"Mizenkei (irrealis form) precedes 'nai' and 'u/you'. 'Kaka-nai' — 'kaka' is the mizenkei."},{q:"「です」「ます」「た」「ない」などは何品詞か？",qe:"What part of speech are 'desu', 'masu', 'ta', 'nai' in Japanese?",opts:["接続詞","助詞","助動詞","副詞"],ans:2,exp:"助動詞（じょどうし）は用言・体言に付いて意味を添える付属語。丁寧・過去・否定などを表す。",expe:"Jodoshi (auxiliary verbs) attach to other words to add meaning: politeness, past tense, negation, etc."}],
     deep:{thinks:[{q:"日本語の敬語（尊敬語・謙譲語・丁寧語）はなぜこんなに複雑なのか？社会的な背景から考えよう。",qe:"Why is Japanese honorific language (keigo) so complex? Think about its social background."},{q:"英語に日本語の「助詞（は・が・を・に）」に当たるものはない。日本語の助詞がなぜ重要なのか考えよう。",qe:"English has no direct equivalent of Japanese particles (wa, ga, wo, ni). Why are particles so important?"}],world:"日本語の文法の複雑さ（敬語・助詞・活用）は日本文化の繊細さを反映している。外国人が日本語を学ぶ難しさを理解することで、他言語学習者への共感力が育つ（SDG10：不平等をなくそう）。"}},

var curUnit=null,quizIdx=0,quizScore=0,quizAnswered=false;

function buildUnits(grade){
  var id=grade==="中1"?"ul1":grade==="中2"?"ul2":"ul3";
  var ul=document.getElementById(id);
  if(ul.children.length>0) return;
  units[grade].forEach(function(u){
    var btn=document.createElement("button");
    btn.className="unit-btn";
    btn.textContent=u.name;
    btn.onclick=function(){
      document.querySelectorAll(".unit-btn").forEach(function(b){b.classList.remove("on");});
      btn.classList.add("on");
      openUnit(u);
    };
    ul.appendChild(btn);
  });
}

function switchGrade(id,btn){
  document.querySelectorAll(".grade-section").forEach(function(s){s.classList.remove("on");});
  document.querySelectorAll(".gtab").forEach(function(t){t.classList.remove("on");});
  document.getElementById(id).classList.add("on");
  btn.classList.add("on");
  var g=id==="g1"?"中1":id==="g2"?"中2":"中3";
  buildUnits(g);
  closeUnit();
}

function openUnit(u){
  curUnit=u;
  document.getElementById("unit-title").textContent=u.name;
  document.getElementById("learn-area").classList.add("on");
  switchLearn("video",document.querySelectorAll(".ltab")[0]);
  document.getElementById("learn-area").scrollIntoView({behavior:"smooth"});
}

function closeUnit(){
  document.getElementById("learn-area").classList.remove("on");
  document.querySelectorAll(".unit-btn").forEach(function(b){b.classList.remove("on");});
  curUnit=null;
}

function switchLearn(step,btn){
  document.querySelectorAll(".learn-step").forEach(function(s){s.classList.remove("on");});
  document.querySelectorAll(".ltab").forEach(function(t){t.classList.remove("on");});
  document.getElementById("ls-"+step).classList.add("on");
  if(btn) btn.classList.add("on");
  if(step==="video") renderVideos();
  if(step==="quiz"){quizIdx=0;quizScore=0;renderQuiz();}
  if(step==="deep") renderDeep();
}

function renderVideos(){
  if(!curUnit) return;
  var vl=document.getElementById("video-list");
  vl.innerHTML="";
  curUnit.yt.forEach(function(v){
    var d=document.createElement("div");
    d.className="yt-card";
    d.innerHTML="<div class=\"yt-thumb\">&#9654;</div><div class=\"yt-info\"><div class=\"yt-ch\">"+v.ch+"</div><div class=\"yt-title\">"+v.title+"</div><div class=\"yt-desc\">"+v.desc+"</div><a href=\""+v.url+"\" target=\"_blank\" class=\"yt-btn\">&#9654; YouTubeで見る</a></div>";
    vl.appendChild(d);
  });
}

function renderQuiz(){
  if(!curUnit) return;
  var qs=curUnit.quiz,qa=document.getElementById("quiz-area");
  if(quizIdx>=qs.length){
    var pct=Math.round(quizScore/qs.length*100);
    qa.innerHTML="<div style=\"text-align:center;padding:16px 0;\"><div style=\"font-size:32px;margin-bottom:8px;\">"+(pct>=80?"&#127881;":pct>=60?"&#128077;":"&#128170;")+"</div><div style=\"font-size:20px;font-weight:700;color:#534AB7;margin-bottom:6px;\">"+quizScore+" / "+qs.length+" 正解</div><button onclick=\"quizIdx=0;quizScore=0;renderQuiz()\" style=\"padding:8px 18px;border-radius:8px;background:#534AB7;color:#fff;font-size:13px;border:none;cursor:pointer;\">もう一度</button></div>";
    return;
  }
  document.getElementById("score-disp").textContent=quizScore+"/"+qs.length;
  document.getElementById("prog-fill").style.width=Math.round(quizScore/qs.length*100)+"%";
  var q=qs[quizIdx];
  qa.innerHTML="<div class=\"q-box\"><div class=\"q-en\">"+q.qe+"</div><div class=\"q-ja\">&#127471;&#127477; "+q.q+"</div><div class=\"opts\">"+q.opts.map(function(o,i){return "<button class=\"opt-btn\" onclick=\"answerQ("+i+")\">"+o+"</button>";}).join("")+"</div><div class=\"exp-box\" id=\"exp-box\"><strong>&#128218; 解説</strong><br>"+q.exp+"</div></div><button class=\"next-btn\" id=\"nxt-btn\" style=\"display:none;\" onclick=\"nextQ()\">"+(quizIdx<qs.length-1?"次の問題 &#8594;":"結果を見る &#127881;")+"</button>";
  quizAnswered=false;
}

function answerQ(i){
  if(quizAnswered) return;
  quizAnswered=true;
  var q=curUnit.quiz[quizIdx];
  document.querySelectorAll(".opt-btn").forEach(function(b,idx){
    b.disabled=true;
    if(idx===q.ans) b.classList.add("correct");
    else if(idx===i&&i!==q.ans) b.classList.add("wrong");
  });
  if(i===q.ans) quizScore++;
  document.getElementById("exp-box").style.display="block";
  document.getElementById("nxt-btn").style.display="inline-block";
  document.getElementById("score-disp").textContent=quizScore+"/"+curUnit.quiz.length;
  document.getElementById("prog-fill").style.width=Math.round(quizScore/curUnit.quiz.length*100)+"%";
}

function nextQ(){quizIdx++;renderQuiz();}

function renderDeep(){
  if(!curUnit) return;
  var d=curUnit.deep,da=document.getElementById("deep-area");
  var html="";
  d.thinks.forEach(function(t){html+="<div class=\"think-q\">&#129504; "+t.q+"<div class=\"think-en\">&#127468;&#127463; "+t.qe+"</div></div>";});
  html+="<textarea placeholder=\"考えたことを書こう / Write your thoughts...\"></textarea>";
  html+="<div class=\"world-box\"><strong>&#127758; 世界・熊本とのつながり</strong><br>"+d.world+"</div>";
  html+="<div style=\"margin-top:12px;\"><a href=\"tool6_study.html\" style=\"display:inline-block;padding:8px 14px;border-radius:8px;background:#534AB7;color:#fff;font-size:13px;font-weight:600;text-decoration:none;\">&#127891; 他の教科も学ぼう</a></div>";
  da.innerHTML=html;
}

buildUnits("中1");
